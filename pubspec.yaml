name: shadow_game
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ">=3.3.2 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  flutter_svg: ^2.0.11
  go_router: ^14.2.7
  intl: ^0.20.2
  shared_preferences: ^2.3.2
  flutter_native_splash: ^2.4.3
  get_it: ^7.7.0
  equatable: ^2.0.5

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter_native_splash:
  color: "#B1B1AF"
  image: assets/icon_splash.png
  android: true
  ios: true
  android_12:
    image: assets/icon_splash.png
    color: "#B1B1AF"

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/images/level_two/
    - assets/images/level_one/
    - assets/images/level_one/door/
    - assets/images/level_one/chest/
    - assets/images/lobby/
    - assets/images/shared/
    - assets/images/shared/damage/
    - assets/images/shared/endurance/
    - assets/images/shared/speed/
    - assets/images/shared/life/
    - assets/gifs/
    - assets/icons/
    - assets/frames/player/attack/
    - assets/frames/player/dance/
    - assets/frames/player/jump/
    - assets/frames/player/stay/
    - assets/frames/player/walk/
    - assets/frames/shadow/bark/
    - assets/frames/shadow/sit/
    - assets/frames/shadow/walk/
    - assets/frames/spider/attack/
    - assets/frames/spider/die/
    - assets/frames/spider/walk/
    - assets/frames/spider/stay/
    - assets/frames/objects/coin/
    - assets/frames/objects/loading/
    - assets/frames/
